<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pon a Prueba lo Aprendido — Cisco IT Essentials Virtual Desktop &amp; Logisim Evolution</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #f8f7f3;
    --paper-line: #e2e5e0;
    --ink: #182430;
    --muted: #6e7a86;
    --cisco: #0f6690;
    --cisco-soft: #e7f1f6;
    --logisim: #a04d1a;
    --logisim-soft: #f7ece2;
    --panel-border: #e5e7e1;
    --shadow: 28, 42, 53;
    --good: #2f7d4f;
    --good-soft: #e8f4ec;
    --bad: #b23a2e;
    --bad-soft: #fbeae7;
  }

  *{ box-sizing: border-box; margin:0; padding:0; }
  html,body{ height:100%; }

  body{
    background: var(--paper);
    color: var(--ink);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    background-image:
      linear-gradient(var(--paper-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--paper-line) 1px, transparent 1px);
    background-size: 44px 44px;
    background-position: -1px -1px;
  }

  .page{
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: clamp(22px, 4vw, 56px);
  }

  .back-link{
    display: inline-flex;
    align-items: center;
    gap: 8px;
    align-self: flex-start;
    margin-bottom: clamp(26px, 5vw, 48px);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--muted);
    transition: color 0.2s ease, gap 0.2s ease;
  }
  .back-link:hover{ color: var(--ink); gap: 12px; }
  .back-link svg{ width: 14px; height: 14px; }

  .section-head{
    width: min(680px, 100%);
    text-align: center;
    margin-bottom: clamp(26px, 5vw, 44px);
  }

  .section-eyebrow{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
  }

  h1.section-title{
    font-family: 'Source Serif 4', serif;
    font-weight: 600;
    font-size: clamp(24px, 4vw, 34px);
    margin-top: 10px;
    color: var(--ink);
  }

  p.section-desc{
    max-width: 46ch;
    margin: 14px auto 0;
    font-size: 14px;
    line-height: 1.6;
    color: var(--muted);
  }

  .card{
    position: relative;
    width: min(680px, 100%);
    background: #ffffff;
    border: 1px solid var(--panel-border);
    border-radius: 10px;
    padding: clamp(26px, 5vw, 40px);
    box-shadow: 0 1px 2px rgba(var(--shadow),0.05), 0 24px 44px -28px rgba(var(--shadow),0.24);
    overflow: hidden;
  }

  .card::before{
    content:"";
    position:absolute; top:0; left:0; right:0; height:4px;
    background: linear-gradient(90deg, var(--cisco), var(--logisim));
  }

  /* progress dots */
  .progress-row{
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 28px;
  }
  .progress-row .dot{
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--paper-line);
    transition: background 0.25s ease, transform 0.25s ease;
  }
  .progress-row .dot.done{ background: var(--good); }
  .progress-row .dot.active{ background: var(--ink); transform: scale(1.3); }

  .q-count{
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .q-text{
    text-align: center;
    font-family: 'Source Serif 4', serif;
    font-weight: 600;
    font-size: clamp(18px, 3vw, 23px);
    line-height: 1.4;
    color: var(--ink);
    min-height: 88px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 4px;
  }

  .choices{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 26px;
  }

  .choice-btn{
    padding: 18px 10px;
    border-radius: 8px;
    border: 2px solid var(--panel-border);
    background: var(--paper);
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 600;
    font-size: 16px;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .choice-btn:hover{ border-color: var(--ink); transform: translateY(-1px); }
  .choice-btn:active{ transform: translateY(0); }
  .choice-btn.yes{ color: var(--good); }
  .choice-btn.no{ color: var(--bad); }
  .choice-btn.yes.picked{ background: var(--good-soft); border-color: var(--good); }
  .choice-btn.no.picked{ background: var(--bad-soft); border-color: var(--bad); }

  .nav-row{
    display: flex;
    justify-content: space-between;
    margin-top: 26px;
  }

  .nav-btn{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 6px 4px;
  }
  .nav-btn:hover{ color: var(--ink); }
  .nav-btn:disabled{ opacity: 0; pointer-events: none; }

  /* results */
  .results{ display:none; text-align:center; }
  .results.show{ display:block; }
  .quiz-body.hide{ display:none; }

  .score-ring{
    width: 150px; height: 150px;
    margin: 0 auto 20px;
    position: relative;
  }
  .score-ring svg{ width: 100%; height: 100%; transform: rotate(-90deg); }
  .score-ring .bg{ fill:none; stroke: var(--paper-line); stroke-width: 10; }
  .score-ring .fg{ fill:none; stroke: var(--good); stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 1s cubic-bezier(.2,.8,.3,1); }
  .score-ring .label{
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
  }
  .score-ring .label .num{ font-family:'Source Serif 4',serif; font-weight:700; font-size: 34px; }
  .score-ring .label .den{ font-family:'IBM Plex Mono',monospace; font-size: 12px; color: var(--muted); }

  .grade-title{
    font-family: 'Source Serif 4', serif;
    font-weight: 600;
    font-size: 22px;
    margin-bottom: 6px;
  }
  .grade-sub{
    font-size: 13.5px;
    color: var(--muted);
    margin-bottom: 26px;
  }

  .review-list{
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 26px;
  }
  .review-item{
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 6px;
    background: var(--paper);
    border: 1px solid var(--panel-border);
  }
  .review-item .mark{
    flex-shrink: 0;
    width: 20px; height: 20px;
    border-radius: 50%;
    display:flex; align-items:center; justify-content:center;
    font-size: 12px; font-weight:700; color:#fff;
    margin-top: 1px;
  }
  .review-item.correct .mark{ background: var(--good); }
  .review-item.wrong .mark{ background: var(--bad); }
  .review-item p{ font-size: 13px; line-height: 1.5; }
  .review-item .correct-note{ color: var(--muted); font-size: 11.5px; margin-top: 2px; }

  .action-row{
    display: flex;
    gap: 12px;
    justify-content: center;
  }

  .btn{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 12px 20px;
    border-radius: 6px;
    border: 1px solid var(--panel-border);
    background: #fff;
    color: var(--ink);
    cursor: pointer;
  }
  .btn.primary{ background: var(--ink); color: #fff; border-color: var(--ink); }

  .history{
    width: min(680px, 100%);
    margin-top: 24px;
  }
  .history h3{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    text-align: center;
  }
  .history-row{
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 8px 4px;
    border-bottom: 1px dashed var(--panel-border);
    color: var(--ink);
  }
  .history-row span:last-child{ color: var(--muted); font-family:'IBM Plex Mono',monospace; font-size: 11.5px; }

  @media (max-width: 480px){
    .choices{ grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="page">

  <a class="back-link" href="videos.html">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M19 12H5M11 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Videos de la Instalaci&oacute;n
  </a>

  <div class="section-head">
    <p class="section-eyebrow">Bonus &middot; Autoevaluaci&oacute;n</p>
    <h1 class="section-title">Pon a Prueba lo Aprendido</h1>
    <p class="section-desc">15 preguntas de S&iacute;/No sobre Cisco IT Essentials Virtual Desktop y Logisim Evolution. Tu resultado se guarda autom&aacute;ticamente en este dispositivo.</p>
  </div>

  <div class="card">

    <div class="quiz-body" id="quizBody">
      <div class="progress-row" id="progressRow"></div>
      <p class="q-count" id="qCount">Pregunta 1 de 15</p>
      <p class="q-text" id="qText"></p>

      <div class="choices">
        <button class="choice-btn yes" id="btnYes" onclick="answer(true)">S&Iacute;</button>
        <button class="choice-btn no" id="btnNo" onclick="answer(false)">NO</button>
      </div>

      <div class="nav-row">
        <button class="nav-btn" id="prevBtn" onclick="goPrev()">&larr; Anterior</button>
        <span></span>
      </div>
    </div>

    <div class="results" id="results">
      <div class="score-ring">
        <svg viewBox="0 0 120 120">
          <circle class="bg" cx="60" cy="60" r="52"></circle>
          <circle class="fg" id="scoreArc" cx="60" cy="60" r="52" stroke-dasharray="327" stroke-dashoffset="327"></circle>
        </svg>
        <div class="label">
          <span class="num" id="scoreNum">0</span>
          <span class="den" id="denLabel">de 15</span>
        </div>
      </div>
      <p class="grade-title" id="gradeTitle"></p>
      <p class="grade-sub" id="gradeSub"></p>

      <div class="review-list" id="reviewList"></div>

      <div class="action-row">
        <button class="btn primary" onclick="restart()">Intentar de nuevo</button>
      </div>
    </div>

  </div>

  <div class="history" id="historyBox" style="display:none;">
    <h3>Tus intentos anteriores</h3>
    <div id="historyList"></div>
  </div>

</div>

<script>
  const questions = [
    { text: "Logisim Evolution es de c\u00f3digo abierto y completamente gratuito.", answer: true },
    { text: "Cisco IT Essentials Virtual Desktop requiere una tarjeta gr\u00e1fica dedicada de alta gama.", answer: false },
    { text: "Logisim Evolution necesita tener Java instalado para funcionar.", answer: true },
    { text: "Cisco IT Essentials Virtual Desktop puede simular fallas reales de hardware, como cortocircuitos.", answer: false },
    { text: "Logisim Evolution es multiplataforma: funciona en Windows, macOS y Linux.", answer: true },
    { text: "Cisco IT Essentials Virtual Desktop se puede descargar libremente desde cualquier sitio web sin restricciones.", answer: false },
    { text: "Logisim Evolution est\u00e1 licenciado bajo la GPL-3.0 (software libre).", answer: true },
    { text: "Cisco IT Essentials Virtual Desktop permite practicar el ensamblaje de una PC sin usar hardware real.", answer: true },
    { text: "Cisco IT Essentials Virtual Desktop forma parte del programa Cisco Networking Academy.", answer: true },
    { text: "Logisim Evolution permite simular circuitos l\u00f3gicos como compuertas AND, OR y NOT.", answer: true },
    { text: "Para instalar Logisim Evolution siempre hay que instalar Java por separado, incluso usando el instalador oficial de Windows.", answer: false },
    { text: "El uso de Cisco IT Essentials Virtual Desktop es completamente gratuito y sin ning\u00fan tipo de restricci\u00f3n de acceso.", answer: false },
    { text: "Logisim Evolution se debe descargar preferiblemente desde sitios espejo en vez de su repositorio oficial.", answer: false },
    { text: "Una limitaci\u00f3n de Logisim Evolution es que no considera variables f\u00edsicas reales como el ruido el\u00e9ctrico o la temperatura.", answer: true },
    { text: "El manual de funcionamiento b\u00e1sico del sitio incluye una galer\u00eda ilustrada con los pasos de instalaci\u00f3n y uso.", answer: true },
  ];

  let current = 0;
  let userAnswers = new Array(questions.length).fill(null);

  const progressRow = document.getElementById('progressRow');
  const qCount = document.getElementById('qCount');
  const qText = document.getElementById('qText');
  const btnYes = document.getElementById('btnYes');
  const btnNo = document.getElementById('btnNo');
  const prevBtn = document.getElementById('prevBtn');

  function buildDots(){
    progressRow.innerHTML = '';
    questions.forEach((_, i) => {
      const d = document.createElement('span');
      d.className = 'dot';
      progressRow.appendChild(d);
    });
  }

  function renderDots(){
    const dots = progressRow.querySelectorAll('.dot');
    dots.forEach((d, i) => {
      d.classList.remove('active','done');
      if (userAnswers[i] !== null) d.classList.add('done');
      if (i === current) d.classList.add('active');
    });
  }

  function renderQuestion(){
    qCount.textContent = `Pregunta ${current + 1} de ${questions.length}`;
    qText.textContent = questions[current].text;
    btnYes.classList.remove('picked');
    btnNo.classList.remove('picked');
    const a = userAnswers[current];
    if (a === true) btnYes.classList.add('picked');
    if (a === false) btnNo.classList.add('picked');
    prevBtn.disabled = current === 0;
    renderDots();
  }

  function answer(val){
    userAnswers[current] = val;
    renderQuestion();
    setTimeout(() => {
      if (current < questions.length - 1){
        current++;
        renderQuestion();
      } else {
        showResults();
      }
    }, 220);
  }

  function goPrev(){
    if (current > 0){
      current--;
      renderQuestion();
    }
  }

  function showResults(){
    document.getElementById('quizBody').classList.add('hide');
    const results = document.getElementById('results');
    results.classList.add('show');

    let score = 0;
    const reviewList = document.getElementById('reviewList');
    reviewList.innerHTML = '';

    questions.forEach((q, i) => {
      const correct = userAnswers[i] === q.answer;
      if (correct) score++;
      const item = document.createElement('div');
      item.className = 'review-item ' + (correct ? 'correct' : 'wrong');
      item.innerHTML = `
        <span class="mark">${correct ? '✓' : '✕'}</span>
        <div>
          <p>${q.text}</p>
          ${!correct ? `<p class="correct-note">Respuesta correcta: ${q.answer ? 'S\u00ed' : 'No'}</p>` : ''}
        </div>`;
      reviewList.appendChild(item);
    });

    document.getElementById('scoreNum').textContent = score;

    const circumference = 327;
    const offset = circumference - (score / questions.length) * circumference;
    const arc = document.getElementById('scoreArc');
    setTimeout(() => { arc.style.strokeDashoffset = offset; }, 80);

    let title, sub, arcColor;
    if (score === 8){ title = '\u00a1Perfecto! \ud83c\udfc6'; sub = 'Te sabes el tema al derecho y al rev\u00e9s.'; arcColor = '#2f7d4f'; }
    else if (score >= 6){ title = '\u00a1Muy bien! \ud83d\udc4f'; sub = 'Dominas la mayor\u00eda de los conceptos.'; arcColor = '#2f7d4f'; }
    else if (score >= 4){ title = 'Vas bien, repasa un poco \ud83d\udcd8'; sub = 'Le falta un repaso a algunas secciones.'; arcColor = '#a04d1a'; }
    else { title = 'Repasa el sitio de nuevo \ud83d\udd01'; sub = 'Revisa Ventajas, Requisitos y Gu\u00eda de Instalaci\u00f3n.'; arcColor = '#b23a2e'; }

    document.getElementById('gradeTitle').textContent = title;
    document.getElementById('gradeSub').textContent = sub;
    arc.style.stroke = arcColor;

    saveAttempt(score);
    renderHistory();
  }

  function saveAttempt(score){
    try{
      const raw = localStorage.getItem('quiz-attempts-tema1');
      const attempts = raw ? JSON.parse(raw) : [];
      attempts.unshift({ score: score, total: questions.length, date: new Date().toLocaleString('es-ES', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }) });
      localStorage.setItem('quiz-attempts-tema1', JSON.stringify(attempts.slice(0, 8)));
    } catch(e){ /* localStorage no disponible */ }
  }

  function renderHistory(){
    try{
      const raw = localStorage.getItem('quiz-attempts-tema1');
      const attempts = raw ? JSON.parse(raw) : [];
      const box = document.getElementById('historyBox');
      const list = document.getElementById('historyList');
      if (attempts.length === 0){ box.style.display = 'none'; return; }
      box.style.display = 'block';
      list.innerHTML = attempts.map(a => `
        <div class="history-row"><span>${a.score} / ${a.total || questions.length}</span><span>${a.date}</span></div>
      `).join('');
    } catch(e){ /* localStorage no disponible */ }
  }

  function restart(){
    current = 0;
    userAnswers = new Array(questions.length).fill(null);
    document.getElementById('quizBody').classList.remove('hide');
    document.getElementById('results').classList.remove('show');
    document.getElementById('scoreArc').style.strokeDashoffset = 327;
    renderQuestion();
  }

  buildDots();
  renderQuestion();
  renderHistory();
  document.getElementById('denLabel').textContent = `de ${questions.length}`;
</script>

</body>
</html>
